<div class="min-h-screen bg-slate-900 text-slate-100 flex flex-col font-sans">
  <!-- Navigation Header -->
  <header class="bg-slate-900/80 backdrop-blur-md border-b border-slate-800 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">
        
        <!-- Logo -->
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-emerald-500 to-teal-400 flex items-center justify-center shadow-lg shadow-emerald-500/20">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-slate-950" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" />
            </svg>
          </div>
          <div>
            <span class="text-lg font-bold tracking-tight bg-gradient-to-r from-emerald-400 to-teal-300 bg-clip-text text-transparent">VisiTrack</span>
            <span class="text-xs block text-slate-400 font-medium -mt-1">Corporate Guest Management</span>
          </div>
        </div>

        <!-- Navigation Links -->
        <nav class="flex items-center gap-1 sm:gap-2">
          <a routerLink="/dashboard" 
             routerLinkActive="bg-slate-800 text-emerald-400 border-emerald-500/50" 
             [routerLinkActiveOptions]="{exact: true}"
             class="px-4 py-2 rounded-xl text-sm font-medium border border-transparent text-slate-300 hover:text-slate-100 hover:bg-slate-800/60 transition-all duration-200 flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2v-4zM14 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2v-4z" />
            </svg>
            Dashboard
          </a>

          <a routerLink="/check-in" 
             routerLinkActive="bg-slate-800 text-emerald-400 border-emerald-500/50" 
             class="px-4 py-2 rounded-xl text-sm font-medium border border-transparent text-slate-300 hover:text-slate-100 hover:bg-slate-800/60 transition-all duration-200 flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" />
            </svg>
            Check-In
          </a>

          <a routerLink="/search" 
             routerLinkActive="bg-slate-800 text-emerald-400 border-emerald-500/50" 
             class="px-4 py-2 rounded-xl text-sm font-medium border border-transparent text-slate-300 hover:text-slate-100 hover:bg-slate-800/60 transition-all duration-200 flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
            Search Logs
          </a>
        </nav>

      </div>
    </div>
  </header>

  <!-- Main View -->
  <main class="flex-grow max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <router-outlet></router-outlet>
  </main>

  <!-- Footer -->
  <footer class="border-t border-slate-800 bg-slate-950 py-4 text-center text-xs text-slate-500">
    <div class="max-w-7xl mx-auto px-4">
      &copy; 2026 VisiTrack Inc. All rights reserved. • Portfolio Project Built with ASP.NET Core & Angular
    </div>
  </footer>
</div>
